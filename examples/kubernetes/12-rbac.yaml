apiVersion: v1
kind: ServiceAccount
metadata:
  name: teastore-service-account
  namespace: teastore
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: teastore-role
  namespace: teastore
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: teastore-role-binding
  namespace: teastore
subjects:
  - kind: ServiceAccount
    name: teastore-service-account
    namespace: teastore
roleRef:
  kind: Role
  name: teastore-role
  apiGroup: rbac.authorization.k8s.io
