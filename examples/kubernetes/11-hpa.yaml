# Note: maxReplicas set to 2 for Minikube (limited resources)
# In production EKS: maxReplicas should be 5
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: teastore-webui-hpa
  namespace: teastore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: teastore-webui
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
# Note: maxReplicas set to 2 for Minikube (limited resources)
# In production EKS: maxReplicas should be 3
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: teastore-persistence-hpa
  namespace: teastore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: teastore-persistence
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
