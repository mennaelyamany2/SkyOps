---
- name: Configure EKS and Deploy TeaStore
  hosts: localhost
  gather_facts: false

  vars:
    cluster_name: "teastore-cluster"
    region: "eu-west-1"
    k8s_manifests: "~/TeaStore/examples/kubernetes"

  tasks:
    - name: Update kubeconfig for EKS cluster
      command: >
        aws eks update-kubeconfig
        --name {{ cluster_name }}
        --region {{ region }}

    - name: Verify cluster connection
      command: kubectl get nodes
      register: nodes_output

    - name: Show cluster nodes
      debug:
        msg: "{{ nodes_output.stdout }}"

    - name: Apply Kubernetes manifests
      command: kubectl apply -f {{ k8s_manifests }}

    - name: Wait for pods to be ready
      command: kubectl wait --for=condition=ready pod --all -n teastore --timeout=600s
      ignore_errors: true

    - name: Get pods status
      command: kubectl get pods -n teastore
      register: pods_output

    - name: Show pods status
      debug:
        msg: "{{ pods_output.stdout }}"

    - name: Create ArgoCD namespace
      command: kubectl create namespace argocd
      ignore_errors: true

    - name: Install ArgoCD
      command: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      ignore_errors: true

    - name: Wait for ArgoCD pods
      command: kubectl wait --for=condition=ready pod --all -n argocd --timeout=300s
      ignore_errors: true

    - name: Expose ArgoCD as LoadBalancer
      command: kubectl patch svc argocd-server -n argocd -p '{"spec":{"type":"LoadBalancer"}}'
      ignore_errors: true

    - name: Apply ArgoCD application
      command: kubectl apply -f ~/TeaStore/argocd-app.yaml
      ignore_errors: true

    - name: Get ArgoCD URL
      command: kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
      register: argocd_url
      ignore_errors: true

    - name: Show ArgoCD URL
      debug:
        msg: "ArgoCD is available at: https://{{ argocd_url.stdout }}"

    - name: Get ArgoCD admin password
      command: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}"
      register: argocd_password_b64
      ignore_errors: true

    - name: Decode ArgoCD password
      command: echo "{{ argocd_password_b64.stdout }}" | base64 -d
      register: argocd_password
      ignore_errors: true

    - name: Show ArgoCD credentials
      debug:
        msg: "ArgoCD Username: admin | Password: {{ argocd_password.stdout }}"

    - name: Get webui service URL
      command: kubectl get svc teastore-webui -n teastore -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
      register: webui_url
      ignore_errors: true

    - name: Show website URL
      debug:
        msg: "Website is available at: http://{{ webui_url.stdout }}:8080/tools.descartes.teastore.webui/"
